<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANJII iOS - Elite Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --purple: #9d50bb;
            --neon-glow: 0 0 20px rgba(0, 210, 255, 0.8), 0 0 40px rgba(0, 210, 255, 0.4);
            --text-glow: 0 0 15px rgba(0, 210, 255, 1), 0 0 30px rgba(0, 210, 255, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background: #050608;
            background-image: radial-gradient(circle at top right, #1a1b26 0%, #050608 100%);
            color: white; font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        /* Navbar & Balance */
        .navbar {
            position: fixed; top: 0; width: 100%; max-width: 500px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 100;
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .balance-pill {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 8px 15px; border-radius: 50px;
            font-family: 'Orbitron'; font-size: 11px;
            box-shadow: var(--neon-glow); display: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { box-shadow: var(--neon-glow); } 50% { box-shadow: 0 0 40px var(--accent); } }

        .container { width: 100%; max-width: 480px; padding: 100px 20px 40px; box-sizing: border-box; }

        /* Neon Branding */
        .logo-box {
            width: 80px; height: 80px; margin: 0 auto 15px;
            background: linear-gradient(45deg, var(--accent), var(--purple));
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--accent); font-size: 40px;
        }
        h1 { 
            font-family: 'Orbitron'; font-size: 28px; letter-spacing: 5px; 
            text-shadow: var(--text-glow); text-align: center; margin: 0;
        }

        /* Galaxy Cards */
        .galaxy-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; padding: 30px; margin-bottom: 25px;
            backdrop-filter: blur(25px);
        }

        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 16px; color: white; width: 100%;
            margin-top: 10px; box-sizing: border-box; font-family: 'Rajdhani'; font-size: 16px;
        }
        .input-box:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px var(--accent); }

        /* Super Neon Buttons */
        .btn-neon {
            width: 100%; padding: 18px; border-radius: 18px;
            border: none; cursor: pointer; font-weight: bold;
            font-family: 'Orbitron'; font-size: 13px; letter-spacing: 2px;
            transition: 0.4s; margin-top: 15px;
            background: #000; color: white;
            border-bottom: 4px solid var(--accent);
            text-shadow: 0 0 10px #fff;
        }
        .btn-neon:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 0 40px var(--accent);
            border-bottom: 4px solid #fff;
        }

        /* Product List Style */
        .product-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;
        }
        .btn-buy-small {
            background: var(--accent); color: black; border: none;
            padding: 8px 15px; border-radius: 10px; font-family: 'Orbitron';
            font-size: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--accent);
        }

        /* Loading Screen */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,6,8,0.98); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 70px; height: 70px; border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--accent);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .section { display: none; }
        .active { display: block; animation: zoomIn 0.4s ease forwards; }
        @keyframes zoomIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-family: 'Orbitron'; color: var(--accent); text-shadow: var(--text-glow);">⚡ M-iOS</div>
    <div class="balance-pill" id="balanceArea">💰 Rp <span id="balVal">0</span></div>
</div>

<div id="loadingOverlay">
    <div class="loader"></div>
    <h3 style="font-family: 'Orbitron'; color: var(--accent); margin-top: 20px; text-shadow: var(--text-glow);">PROCESSING...</h3>
</div>

<div class="container">
    <div id="loginSec" class="section active">
        <div class="logo-box">💎</div>
        <h1>MANJII iOS</h1>
        <div class="galaxy-card" style="margin-top: 30px;">
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button class="btn-neon" style="margin:0; flex:1;" id="tabCus">CUSTOMER</button>
                <button class="btn-neon" style="margin:0; flex:1; border-bottom-color: var(--purple);" id="tabRes">RESELLER</button>
            </div>
            <input type="text" id="logU" class="input-box" placeholder="USERNAME">
            <input type="password" id="logP" class="input-box" placeholder="PASSWORD">
            <button class="btn-neon" onclick="tryLogin()" style="background: var(--accent); color: black;">LOGIN ➔</button>
            <p id="regText" style="text-align: center; font-size: 13px; margin-top: 20px; opacity: 0.6;">
                Belum punya akun? <a href="javascript:void(0)" onclick="showSec('regSec')" style="color: var(--accent);">Daftar</a>
            </p>
        </div>
    </div>

    <div id="regSec" class="section">
        <h1>DAFTAR AKUN</h1>
        <div class="galaxy-card" style="margin-top: 20px;">
            <input type="text" id="regU" class="input-box" placeholder="USERNAME BARU">
            <input type="password" id="regP" class="input-box" placeholder="PASSWORD BARU">
            <button class="btn-neon" onclick="doRegister()" style="background: var(--purple);">REGISTER</button>
            <button onclick="showSec('loginSec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">⬅ KEMBALI</button>
        </div>
    </div>

    <div id="prodSec" class="section">
        <div class="galaxy-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="roleLabel" style="font-family: 'Orbitron'; color: var(--accent); margin:0;">PANEL</h3>
                <span onclick="logout()" style="color:red; cursor:pointer; font-size:12px;">LOGOUT</span>
            </div>
            <div id="plist"></div>
        </div>
    </div>

    <div id="buySec" class="section">
        <div class="galaxy-card">
            <h2 id="selName" style="font-family: 'Orbitron'; margin:0;">PRODUCT</h2>
            <div id="selPrice" style="color: #00ff88; font-family: 'Orbitron'; font-size: 20px; margin: 10px 0;">Rp 0</div>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 20px 0;">
            
            <div id="keyBox" style="display:none; margin-bottom: 20px;">
                <label style="font-size: 11px; opacity: 0.5;">PILIH DURASI:</label>
                <select id="keySel" class="input-box" onchange="updateKeyPrice()">
                    </select>
            </div>

            <label style="font-size: 11px; opacity: 0.5;">USERNAME TELEGRAM</label>
            <input type="text" id="tg" class="input-box" placeholder="@username">
            <label style="font-size: 11px; opacity: 0.5; display:block; margin-top:15px;">NOTE (CATATAN)</label>
            <textarea id="note" class="input-box" style="height: 70px;"></textarea>

            <button class="btn-neon" onclick="toReview()" style="background: var(--accent); color: black;">CEK FORMAT PEMBELIAN</button>
            <button onclick="showSec('prodSec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">⬅ KEMBALI</button>
        </div>
    </div>

    <div id="revSec" class="section">
        <div class="galaxy-card">
            <h3 style="font-family: 'Orbitron'; text-align: center;">KONFIRMASI ORDER</h3>
            <div id="revInfo" style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 2;"></div>
            <button class="btn-neon" onclick="doPay()" style="background: #00ff88; color: black;">BAYAR SEKARANG</button>
            <button onclick="showSec('buySec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">BATAL</button>
        </div>
    </div>

    <div id="pendSec" class="section">
        <div class="galaxy-card" style="text-align: center;">
            <div style="font-size: 50px;">⏳</div>
            <h3 style="font-family: 'Orbitron'; color: orange; text-shadow: 0 0 10px orange;">PENDING...</h3>
            <div id="trx" style="background:#111; padding:15px; border-radius:12px; font-family:monospace; margin:15px 0; color:var(--accent);">#MJ_XXX</div>
            <p style="font-size: 12px; opacity: 0.6;">Pesanan Anda sedang diproses oleh admin manjii ios.</p>
            <button class="btn-neon" onclick="showSec('prodSec')">KEMBALI KE MENU</button>
        </div>
    </div>
</div>

<script>
    // SIMPAN AKUN PERMANEN (localStorage)
    if(!localStorage.getItem('u_db')) localStorage.setItem('u_db', JSON.stringify({"admin":"manjii123"}));
    if(!localStorage.getItem('r_db')) localStorage.setItem('r_db', JSON.stringify({"reseller_vip":"vip777"}));

    let role = 'customer';
    let user = localStorage.getItem('manjii_user') || null;
    let balance = 0;
    let selected = null;

    const data = {
        customer: [
            {n:"PANEL iOS", p:350000},
            {n:"INJECTOR iOS/ANDRO", isK:true},
            {n:"CHEAT iOS", p:250000},
            {n:"GBOX 1 TAHUN", p:150000},
            {n:"ESIGN 1 TAHUN", p:150000}
        ],
        reseller: [
            {n:"PANEL iOS", p:350000},
            {n:"INJECTOR iOS/ANDRO", isK:true},
            {n:"CHEAT iOS", p:200000},
            {n:"GBOX 1 TAHUN", p:130000},
            {n:"ESIGN 1 TAHUN", p:130000}
        ]
    };

    const keyPrices = {
        customer: { "1 DAY":25000, "7 DAY":50000, "30 DAY":70000, "90 DAY":100000, "180 DAY":140000, "218 DAY":160000 },
        reseller: { "1 DAY":20000, "7 DAY":40000, "30 DAY":55000, "90 DAY":85000, "180 DAY":120000, "218 DAY":145000 }
    };

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function tryLogin() {
        const u = document.getElementById('logU').value;
        const p = document.getElementById('logP').value;
        const db = JSON.parse(localStorage.getItem(role === 'customer' ? 'u_db' : 'r_db'));

        if(db[u] && db[u] === p) {
            user = u;
            localStorage.setItem('manjii_user', u);
            localStorage.setItem('manjii_role', role);
            startApp();
        } else {
            alert("Akun tidak terdaftar atau salah!");
        }
    }

    function doRegister() {
        const u = document.getElementById('regU').value;
        const p = document.getElementById('regP').value;
        if(!u || !p) return alert("Isi data!");
        let db = JSON.parse(localStorage.getItem('u_db'));
        db[u] = p;
        localStorage.setItem('u_db', JSON.stringify(db));
        alert("Daftar Berhasil! Login Sekarang.");
        showSec('loginSec');
    }

    function startApp() {
        role = localStorage.getItem('manjii_role') || 'customer';
        document.getElementById('balanceArea').style.display = 'block';
        document.getElementById('roleLabel').innerText = role.toUpperCase() + " PANEL";
        render();
        showSec('prodSec');
    }

    function render() {
        const list = document.getElementById('plist');
        list.innerHTML = '';
        data[role].forEach(item => {
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML = `
                <div style="font-family:'Orbitron'; font-size:14px;">${item.n}</div>
                <button class="btn-buy-small" onclick='openOrder(${JSON.stringify(item)})'>BUY NOW</button>
            `;
            list.appendChild(div);
        });
    }

    function openOrder(item) {
        selected = item;
        document.getElementById('selName').innerText = item.n;
        const kBox = document.getElementById('keyBox');
        
        if(item.isK) {
            kBox.style.display = 'block';
            const s = document.getElementById('keySel');
            s.innerHTML = '';
            for(let d in keyPrices[role]) {
                s.innerHTML += `<option value="${keyPrices[role][d]}">${d}</option>`;
            }
            updateKeyPrice();
        } else {
            kBox.style.display = 'none';
            document.getElementById('selPrice').innerText = "Rp " + item.p.toLocaleString();
            selected.final = item.p;
        }
        showSec('buySec');
    }

    function updateKeyPrice() {
        const p = parseInt(document.getElementById('keySel').value);
        document.getElementById('selPrice').innerText = "Rp " + p.toLocaleString();
        selected.final = p;
    }

    function toReview() {
        const t = document.getElementById('tg').value;
        if(!t) return alert("Isi Username Telegram!");
        document.getElementById('revInfo').innerHTML = `
            PRODUK: ${selected.n}<br>
            HARGA: Rp ${selected.final.toLocaleString()}<br>
            TELEGRAM: ${t}<br>
            METODE: SALDO WEBSITE
        `;
        showSec('revSec');
    }

    function doPay() {
        if(balance < selected.final) return alert("Saldo Rp 0! Hubungi Admin.");
        document.getElementById('loadingOverlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('trx').innerText = "#MJ_" + Math.random().toString(36).substr(2, 9).toUpperCase();
            showSec('pendSec');
        }, 3500);
    }

    function logout() { localStorage.removeItem('manjii_user'); location.reload(); }

    // TAB LOGIC
    document.getElementById('tabCus').onclick = () => {
        role = 'customer';
        document.getElementById('regText').style.display = 'block';
        document.getElementById('tabCus').style.borderColor = 'var(--accent)';
        document.getElementById('tabRes').style.borderColor = '#333';
    };
    document.getElementById('tabRes').onclick = () => {
        role = 'reseller';
        document.getElementById('regText').style.display = 'none';
        document.getElementById('tabRes').style.borderColor = 'var(--purple)';
        document.getElementById('tabCus').style.borderColor = '#333';
    };

    if(user) startApp();
</script>

</body>
</html>
