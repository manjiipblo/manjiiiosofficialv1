<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANJII iOS - Elite Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --purple: #9d50bb;
            --glow: 0 0 20px rgba(0, 210, 255, 0.8), 0 0 40px rgba(0, 210, 255, 0.4);
            --text-glow: 0 0 10px rgba(0, 210, 255, 1), 0 0 20px rgba(0, 210, 255, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background: #050608;
            background-image: radial-gradient(circle at top right, #1a1b26 0%, #050608 100%);
            color: white; font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        /* Navbar & Saldo */
        .navbar {
            position: fixed; top: 0; width: 100%; max-width: 500px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 100;
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .balance-box {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 8px 15px; border-radius: 50px;
            font-family: 'Orbitron'; font-size: 11px;
            box-shadow: var(--glow); display: none;
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { box-shadow: var(--glow); } 50% { box-shadow: 0 0 30px var(--accent); } }

        .container { width: 100%; max-width: 480px; padding: 100px 20px 40px; box-sizing: border-box; }

        /* Branding */
        .brand { text-align: center; margin-bottom: 40px; }
        .logo {
            width: 80px; height: 80px; margin: 0 auto 15px;
            background: linear-gradient(45deg, var(--accent), var(--purple));
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--accent); font-size: 40px;
        }
        h1 { 
            font-family: 'Orbitron'; font-size: 28px; letter-spacing: 5px; 
            text-shadow: var(--text-glow); margin: 0;
        }

        /* Galaxy Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 30px;
            backdrop-filter: blur(30px);
        }

        /* Inputs */
        .input-box {
            width: 100%; padding: 18px; margin-top: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: white; box-sizing: border-box;
            font-family: 'Rajdhani'; font-size: 16px; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); outline: none; }

        /* Super Neon Buttons */
        .btn-neon {
            width: 100%; padding: 18px; border-radius: 18px;
            border: none; cursor: pointer; font-family: 'Orbitron';
            font-size: 13px; letter-spacing: 2px; font-weight: bold;
            transition: 0.4s; margin-top: 15px;
            background: #000; color: #fff;
            border-bottom: 4px solid var(--accent);
            text-shadow: 0 0 10px #fff;
        }
        .btn-neon:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 0 40px var(--accent);
            border-bottom: 4px solid #fff;
        }

        /* Product List */
        .product-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px;
        }
        .p-name { font-family: 'Orbitron'; font-size: 14px; text-shadow: 0 0 5px var(--accent); }
        .btn-buy {
            background: var(--accent); color: black; border: none;
            padding: 8px 15px; border-radius: 10px; font-family: 'Orbitron';
            font-size: 10px; cursor: pointer; box-shadow: 0 0 15px var(--accent);
        }

        /* Loading Overlay */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,6,8,0.98); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 60px; height: 60px; border: 5px solid rgba(0,210,255,0.1);
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--accent);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-family: 'Orbitron'; color: var(--accent); text-shadow: var(--text-glow);">⚡ M-iOS</div>
    <div class="balance-box" id="balanceArea">💰 RP <span id="balVal">0</span></div>
</div>

<div id="loading">
    <div class="loader"></div>
    <h3 style="font-family: 'Orbitron'; margin-top: 20px; color: var(--accent); text-shadow: var(--text-glow);">VERIFYING...</h3>
</div>

<div class="container">
    <div id="loginSec" class="section active">
        <div class="brand">
            <div class="logo">🚀</div>
            <h1>MANJII iOS</h1>
        </div>
        <div class="card">
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button class="btn-neon" style="margin:0; flex:1;" id="tabCus">CUSTOMER</button>
                <button class="btn-neon" style="margin:0; flex:1; border-color: var(--purple);" id="tabRes">RESELLER</button>
            </div>
            <input type="text" id="logU" class="input-box" placeholder="USERNAME">
            <input type="password" id="logP" class="input-box" placeholder="PASSWORD">
            <button class="btn-neon" onclick="tryLogin()" style="background: var(--accent); color: black;">MASUK SISTEM</button>
            <p id="regArea" style="text-align: center; font-size: 13px; margin-top: 20px; opacity: 0.6;">
                Belum punya akun? <a href="javascript:void(0)" onclick="showSec('regSec')" style="color: var(--accent);">Daftar</a>
            </p>
        </div>
    </div>

    <div id="regSec" class="section">
        <h1>DAFTAR</h1>
        <div class="card">
            <input type="text" id="regU" class="input-box" placeholder="USERNAME BARU">
            <input type="password" id="regP" class="input-box" placeholder="PASSWORD BARU">
            <button class="btn-neon" onclick="doRegister()" style="background: var(--purple);">DAFTAR SEKARANG</button>
            <button onclick="showSec('loginSec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">⬅ KEMBALI</button>
        </div>
    </div>

    <div id="prodSec" class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="roleTag" style="font-family: 'Orbitron'; color: var(--accent); margin:0;">PANEL</h3>
                <button onclick="logout()" style="background:none; border:none; color:red; font-size:12px; cursor:pointer;">LOGOUT</button>
            </div>
            <div id="plist"></div>
        </div>
    </div>

    <div id="buySec" class="section">
        <div class="card">
            <h2 id="selName" style="font-family: 'Orbitron'; margin:0;">PRODUK</h2>
            <div id="priceDisplay" style="color: #00ff88; font-family: 'Orbitron'; font-size: 20px; margin: 10px 0;">Rp 0</div>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 20px 0;">
            
            <div id="keyOptions" style="display:none; margin-bottom: 20px;">
                <label style="font-size: 11px; opacity: 0.5;">PILIH DURASI KEY:</label>
                <select id="keySelect" class="input-box" onchange="updateKeyPrice()">
                    </select>
            </div>

            <label style="font-size: 11px; opacity: 0.5;">TELEGRAM USERNAME</label>
            <input type="text" id="tg" class="input-box" placeholder="@username">
            <label style="font-size: 11px; opacity: 0.5; margin-top: 15px; display:block;">NOTE (CATATAN)</label>
            <textarea id="note" class="input-box" style="height: 60px;"></textarea>

            <button class="btn-neon" onclick="toReview()" style="background: var(--accent); color: black;">CEK STATUS FORMAT</button>
            <button onclick="showSec('prodSec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">⬅ KEMBALI</button>
        </div>
    </div>

    <div id="revSec" class="section">
        <div class="card">
            <h3 style="font-family: 'Orbitron'; text-align: center;">KONFIRMASI</h3>
            <div id="revDetail" style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 2;"></div>
            <button class="btn-neon" onclick="payNow()" style="background: #00ff88; color: black;">BAYAR SEKARANG</button>
            <button onclick="showSec('buySec')" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5;">BATAL</button>
        </div>
    </div>

    <div id="pendSec" class="section">
        <div class="card" style="text-align: center; border-color: orange;">
            <div style="font-size: 50px;">⏳</div>
            <h3 style="font-family: 'Orbitron'; color: orange;">ORDER PENDING</h3>
            <div id="trxId" style="background:#111; padding:15px; border-radius:12px; font-family:monospace; margin:15px 0; color:var(--accent);">#MJ_XXX</div>
            <p style="font-size:12px; opacity:0.6;">Pesanan sedang diverifikasi admin. Produk dikirim otomatis ke Telegram.</p>
            <button class="btn-neon" onclick="showSec('prodSec')">BELI LAGI</button>
        </div>
    </div>
</div>

<script>
    // SISTEM PENYIMPANAN PERMANEN (Local Storage)
    if(!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify({"admin":"123"}));
    if(!localStorage.getItem('resellers')) localStorage.setItem('resellers', JSON.stringify({"reseller_vip":"vip777"}));

    let curRole = 'customer';
    let curUser = localStorage.getItem('loggedUser') || null;
    let balance = 0;
    let selectedItem = null;

    const db = {
        customer: [
            {n:"PANEL iOS", p:350000},
            {n:"INJECTOR iOS/ANDRO", isKey:true},
            {n:"CHEAT iOS", p:250000},
            {n:"GBOX 1 TAHUN", p:150000},
            {n:"ESIGN 1 TAHUN", p:150000}
        ],
        reseller: [
            {n:"PANEL iOS", p:350000},
            {n:"INJECTOR iOS/ANDRO", isKey:true},
            {n:"CHEAT iOS", p:200000},
            {n:"GBOX 1 TAHUN", p:130000},
            {n:"ESIGN 1 TAHUN", p:130000}
        ]
    };

    const keys = {
        customer: { "1 DAY":25000, "7 DAY":50000, "30 DAY":70000, "90 DAY":100000, "180 DAY":140000, "218 DAY":160000 },
        reseller: { "1 DAY":20000, "7 DAY":40000, "30 DAY":55000, "90 DAY":85000, "180 DAY":120000, "218 DAY":145000 }
    };

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // AUTH
    function tryLogin() {
        const u = document.getElementById('logU').value;
        const p = document.getElementById('logP').value;
        const store = JSON.parse(localStorage.getItem(curRole === 'customer' ? 'users' : 'resellers'));

        if(store[u] && store[u] === p) {
            curUser = u;
            localStorage.setItem('loggedUser', u);
            localStorage.setItem('role', curRole);
            initApp();
        } else {
            alert("Akun tidak valid!");
        }
    }

    function doRegister() {
        const u = document.getElementById('regU').value;
        const p = document.getElementById('regP').value;
        if(!u || !p) return alert("Isi data!");
        let users = JSON.parse(localStorage.getItem('users'));
        users[u] = p;
        localStorage.setItem('users', JSON.stringify(users));
        alert("Berhasil Daftar! Silakan Login.");
        showSec('loginSec');
    }

    function initApp() {
        curRole = localStorage.getItem('role') || 'customer';
        document.getElementById('balanceArea').style.display = 'block';
        document.getElementById('roleTag').innerText = curRole.toUpperCase() + " PANEL";
        renderList();
        showSec('prodSec');
    }

    function renderList() {
        const list = document.getElementById('plist');
        list.innerHTML = '';
        db[curRole].forEach(i => {
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML = `<span class="p-name">${i.n}</span><button class="btn-buy" onclick='openBuy(${JSON.stringify(i)})'>BUY NOW</button>`;
            list.appendChild(div);
        });
    }

    function openBuy(item) {
        selectedItem = item;
        document.getElementById('selName').innerText = item.n;
        const kArea = document.getElementById('keyOptions');
        
        if(item.isKey) {
            kArea.style.display = 'block';
            const sel = document.getElementById('keySelect');
            sel.innerHTML = '';
            for(let d in keys[curRole]) {
                sel.innerHTML += `<option value="${keys[curRole][d]}">${d}</option>`;
            }
            updateKeyPrice();
        } else {
            kArea.style.display = 'none';
            document.getElementById('priceDisplay').innerText = "Rp " + item.p.toLocaleString();
            selectedItem.finalP = item.p;
        }
        showSec('buySec');
    }

    function updateKeyPrice() {
        const p = parseInt(document.getElementById('keySelect').value);
        document.getElementById('priceDisplay').innerText = "Rp " + p.toLocaleString();
        selectedItem.finalP = p;
    }

    function toReview() {
        const t = document.getElementById('tg').value;
        if(!t) return alert("Isi Telegram!");
        const d = document.getElementById('revDetail');
        d.innerHTML = `PRODUK: ${selectedItem.n}<br>HARGA: Rp ${selectedItem.finalP.toLocaleString()}<br>TELEGRAM: ${t}<br>CATATAN: ${document.getElementById('note').value || '-'}`;
        showSec('revSec');
    }

    function payNow() {
        if(balance < selectedItem.finalP) return alert("Saldo Rp 0! Hubungi Admin.");
        document.getElementById('loading').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('trxId').innerText = "#MJ_" + Math.random().toString(36).substr(2, 8).toUpperCase();
            showSec('pendSec');
        }, 3500);
    }

    function logout() {
        localStorage.removeItem('loggedUser');
        location.reload();
    }

    // Tab Logic
    document.getElementById('tabCus').onclick = () => {
        curRole = 'customer';
        document.getElementById('regArea').style.display = 'block';
        document.getElementById('tabCus').style.borderColor = 'var(--accent)';
        document.getElementById('tabRes').style.borderColor = '#333';
    };
    document.getElementById('tabRes').onclick = () => {
        curRole = 'reseller';
        document.getElementById('regArea').style.display = 'none';
        document.getElementById('tabRes').style.borderColor = 'var(--purple)';
        document.getElementById('tabCus').style.borderColor = '#333';
    };

    // Auto Login Check
    if(curUser) initApp();
</script>
</body>
</html>
